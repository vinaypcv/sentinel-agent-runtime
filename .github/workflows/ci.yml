name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Python quality and tests
    runs-on: ubuntu-latest
    env:
      RUN_LIVE_API_TESTS: "0"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install requirements
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run Ruff
        run: ruff check .

      - name: Run mypy
        run: mypy src

      - name: Run Bandit
        run: bandit -r src

      - name: Run pytest with JSON report
        run: |
          mkdir -p reports
          pytest --json-report --json-report-file=reports/pytest-report.json

      - name: Upload pytest JSON report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-json-report
          path: reports/pytest-report.json
          if-no-files-found: warn
